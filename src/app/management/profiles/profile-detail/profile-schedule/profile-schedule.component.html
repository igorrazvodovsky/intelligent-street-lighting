<!-- TODO: Extract common with dynamic schedule parts into separate component -->

<mat-expansion-panel>
  <mat-expansion-panel-header>
    <mat-panel-title class="mat-subheading-2">
      <strong>{{ schedule.brightness | percent }}</strong
      >&nbsp;
      <ng-container *ngFor="let group of timeGroups">
        {{
          last && last !== first
            ? (group | conversationalTimeGroup: "last")
            : (group | conversationalTimeGroup)
        }}
      </ng-container>
      <!-- weekdays from 6:30 to 23:00, on weekends from 8:00 to 22:00. -->
    </mat-panel-title>
  </mat-expansion-panel-header>
  <!-- TODO: Add hint item if schedule doesn't cover 24/7.  -->
  <!-- Default profile will be applied to the time periods not covered by the schedule. -->
  <!-- TODO: Describe prioritisation? -->
  <mat-slider
    [value]="schedule.brightness"
    aria-label="brightness"
    min="0"
    max="1"
  ></mat-slider>
  <div class="schedule-settings">
    <form>
      <div>
        <span>Active</span>
        <mat-form-field class="no-label no-hint input-auto-width time">
          <mat-select [value]="schedule.time.start | date: 'HH:mm'">
            <mat-option
              *ngFor="let option of timeOptions"
              [value]="option.value"
            >
              {{ option.viewValue }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <span class="text-secondary">&mdash;</span>
        <mat-form-field class="no-label no-hint input-auto-width time">
          <mat-select [value]="schedule.time.end | date: 'HH:mm'">
            <mat-option
              *ngFor="let option of timeOptions"
              [value]="option.value"
            >
              {{ option.viewValue }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <ng-container *ngFor="let day of week; let i = index">
        <div>
          <mat-checkbox [checked]="schedule.time.week[i].enabled">{{
            week[i]
          }}</mat-checkbox>
          <mat-form-field class="no-label no-hint input-auto-width time">
            <mat-select
              [disabled]="!schedule.time.week[i].enabled"
              [placeholder]="
                schedule.time.week[i].enabled
                  ? (schedule.time.start | date: 'HH:mm')
                  : null
              "
              [value]="
                schedule.time.week[i].start
                  ? (schedule.time.week[i].start | date: 'HH:mm')
                  : null
              "
            >
              <mat-option
                *ngFor="let option of timeOptions"
                [value]="option.value"
              >
                {{ option.viewValue }}
              </mat-option>
            </mat-select>
          </mat-form-field>
          <span class="text-secondary">&mdash;</span>
          <mat-form-field class="no-label no-hint input-auto-width time">
            <mat-select
              [disabled]="!schedule.time.week[i].enabled"
              [placeholder]="
                schedule.time.week[i].enabled
                  ? (schedule.time.end | date: 'HH:mm')
                  : null
              "
              [value]="
                schedule.time.week[i].end
                  ? (schedule.time.week[i].end | date: 'HH:mm')
                  : null
              "
            >
              <mat-option
                *ngFor="let option of timeOptions"
                [value]="option.value"
              >
                {{ option.viewValue }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>
      </ng-container>
    </form>
    <div>
      <button [disabled]="first" class="text-secondary" mat-icon-button>
        <mat-icon svgIcon="arrowThinUpRegular" aria-hidden="true"></mat-icon>
      </button>
      <button [disabled]="last" class="text-secondary" mat-icon-button>
        <mat-icon svgIcon="arrowThinDownRegular" aria-hidden="true"></mat-icon>
      </button>
      <button class="text-secondary" mat-icon-button>
        <mat-icon svgIcon="trashRegular" aria-hidden="true"></mat-icon>
      </button>
    </div>
  </div>
</mat-expansion-panel>
