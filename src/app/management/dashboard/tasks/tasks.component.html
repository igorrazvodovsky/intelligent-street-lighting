<header>
  <h2 class="text-heading">Tasks</h2>
  <button mat-button [matMenuTriggerFor]="menu">
    Unassigned<mat-icon svgIcon="dropdownMedium"></mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item>All</button>
    <button mat-menu-item>Unassigned</button>
    <button mat-menu-item>...</button>
  </mat-menu>
</header>
<task-card *ngFor="let task of tasks" [task]="task"></task-card>
