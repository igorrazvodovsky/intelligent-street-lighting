<ng-container *ngIf="isHandset; else desktop">
  <!-- TODO: Remember selected tab -->
  <mat-tab-group>
    <mat-tab label="Areas"> <areas></areas> </mat-tab>
    <mat-tab label="Tasks"> <tasks></tasks> </mat-tab>
    <mat-tab label="Activity"> <activity></activity> </mat-tab>
  </mat-tab-group>
</ng-container>
<ng-template #desktop>
  <section id="main">
    <h2 class="text-heading">Areas</h2>
    <areas></areas>
    <!-- Areas/groups status. e.g. traffic  -->
    <!-- Pinned -->

    <!-- <section class="empty">
      <h3>Empty state</h3>
      <p>Do stuff or wait for something to happen.</p>
    </section> -->
  </section>
  <section id="tasks">
    <h2 class="text-heading">Tasks</h2>
    <tasks></tasks>
  </section>
  <section id="activity">
    <h2 class="text-heading">Activity</h2>
    <activity></activity>
  </section>
</ng-template>
