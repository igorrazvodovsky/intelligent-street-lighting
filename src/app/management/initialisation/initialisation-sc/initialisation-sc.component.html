<form>
  <section>
    <h2>General</h2>
    <div>
      <div class="row">
        <div class="col">
          <mat-form-field>
            <mat-label>Installed</mat-label>
            <input matInput [formControl]="date" [matDatepicker]="picker" />
            <mat-datepicker-toggle
              matSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
        <div class="col">
          <mat-form-field>
            <mat-label>Serial number</mat-label>
            <input matInput value="355855056439654" />
          </mat-form-field>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <mat-form-field>
            <mat-label>Model</mat-label>
            <mat-select [(value)]="SCModel">
              <mat-option *ngFor="let model of SCModels" [value]="model">
                {{ model }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>
        <div class="col">
          <mat-form-field>
            <mat-label>Firmware</mat-label>
            <input matInput value="1.0.0" />
          </mat-form-field>
        </div>
      </div>

      <p>
        <mat-checkbox formControlName="surgeProtection"
          >Line contactor</mat-checkbox
        >
      </p>
      <p>
        <mat-checkbox formControlName="decorativeLighting"
          >Open door sensor</mat-checkbox
        >
      </p>
    </div>
  </section>

  <mat-divider></mat-divider>

  <section>
    <h2>Location</h2>

    <div>
      <div class="row">
        <div class="col">
          <mat-form-field>
            <mat-label>Latitude</mat-label>
            <input matInput value="48.875417" />
          </mat-form-field>
        </div>
        <div class="col">
          <mat-form-field>
            <mat-label>Longitude</mat-label>
            <input matInput value="2.212076" />
          </mat-form-field>
        </div>
      </div>

      <mat-form-field>
        <mat-label>Address</mat-label>
        <input matInput value="37 Rue Voltaire 92500 Rueil-Malmaison, France" />
      </mat-form-field>
      <button mat-stroked-button>Show on map</button>

      <!-- TODO: Group autocomplete -->
      <!-- Set default if coordinates match -->
    </div>
  </section>
</form>
