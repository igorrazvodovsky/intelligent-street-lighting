<app-page-actions>
  <breadcrumbs></breadcrumbs>
  <div>
    <button
      [matMenuTriggerFor]="addMenu"
      type="button"
      aria-label="Add"
      mat-icon-button
    >
      <mat-icon svgIcon="plusBold" aria-hidden="true"></mat-icon>
    </button>
    <mat-menu #addMenu="matMenu">
      <button routerLink="/management/initialise" mat-menu-item>Device</button>
      <button (click)="openDialog()" mat-menu-item>Area</button>
    </mat-menu>
    <!-- This toggle works differently on desktop and mobile -->
    <!-- on desktop it toggles the list size -->
    <!-- on mobile it toggles between list and map -->
    <button
      [color]="maximized || (isHandset && opened) ? '' : 'accent'"
      class="list-max-toggle mat-elevation-z0"
      type="button"
      aria-label="Toggle device list"
      mat-mini-fab
      (click)="isHandset ? drawer.toggle() : toggleMaximize()"
    >
      <mat-icon svgIcon="mapBold" aria-hidden="true"></mat-icon>
    </button>
  </div>
</app-page-actions>

<mat-sidenav-container class="devices-container">
  <mat-sidenav
    [(opened)]="opened"
    #drawer
    class="device-list"
    [attr.role]="isHandset ? 'dialog' : 'navigation'"
    [mode]="isHandset ? 'over' : 'side'"
    [opened]="isHandset === false"
    [class]="maximized ? 'maximized' : ''"
  >
    <router-outlet></router-outlet>
  </mat-sidenav>
  <mat-sidenav-content>
    <button
      *ngIf="!isHandset"
      class="list-toggle"
      type="button"
      aria-label="Toggle sidenav"
      mat-icon-button
      (click)="drawer.toggle()"
    >
      <mat-icon
        [svgIcon]="opened ? 'chevronLeftBold' : 'chevronRightBold'"
        aria-hidden="true"
      ></mat-icon>
    </button>
    <devices-map></devices-map>
  </mat-sidenav-content>
</mat-sidenav-container>
