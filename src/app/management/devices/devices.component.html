<app-page-actions>
  <breadcrumbs [deviceId]="deviceId" [groupId]="groupId"></breadcrumbs>
  <button
    [color]="maximized ? '' : 'accent'"
    class="list-max-toggle mat-elevation-z0"
    type="button"
    aria-label="Toggle sidenav"
    mat-mini-fab
    (click)="toggleMaximize()"
  >
    <mat-icon svgIcon="mapBold" aria-label="List toggle icon"></mat-icon>
  </button>
</app-page-actions>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    [(opened)]="opened"
    #drawer
    class="sidenav"
    [attr.role]="isHandset ? 'dialog' : 'navigation'"
    [mode]="isHandset ? 'over' : 'side'"
    [opened]="isHandset === false"
    [class]="maximized ? 'maximized' : ''"
  >
    <router-outlet></router-outlet>
  </mat-sidenav>
  <mat-sidenav-content>
    <button
      class="list-toggle"
      type="button"
      aria-label="Toggle sidenav"
      mat-icon-button
      (click)="drawer.toggle()"
    >
      <mat-icon
        [svgIcon]="opened ? 'chevronLeftBold' : 'chevronRightBold'"
        aria-label="List toggle icon"
      ></mat-icon>
    </button>
    <devices-map></devices-map>
  </mat-sidenav-content>
</mat-sidenav-container>
