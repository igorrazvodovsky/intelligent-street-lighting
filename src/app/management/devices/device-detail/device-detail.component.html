<div *ngIf="device$ | async as device">
  <mat-tab-group id="device" animationDuration="0ms">
    <mat-tab label="Overview">
      <device-overview [device]="device"></device-overview>
    </mat-tab>
    <mat-tab label="Motion sensor">
      <device-motion-sensor></device-motion-sensor>
    </mat-tab>
    <mat-tab label="Metrics">
      <device-metrics></device-metrics>
    </mat-tab>
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon svgIcon="infoMedium"></mat-icon>
      </ng-template>
      <device-info></device-info>
    </mat-tab>
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon svgIcon="historyMedium"></mat-icon>
      </ng-template>
      <device-history [id]="device.id"></device-history>
    </mat-tab>
  </mat-tab-group>
</div>
