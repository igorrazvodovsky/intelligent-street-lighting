<mat-selection-list *ngIf="groups" role="list" [multiple]="false">
  <ng-container *ngFor="let group of groups">
    <!-- *ngIf="(getDeviceNumber(group.id) | async)?.length > 0" -->
    <mat-list-option [routerLink]="'group/' + [group.id]" role="listitem">
      <!-- <mat-icon matListIcon svgIcon="chevronRightRegular"></mat-icon> -->
      <div matLine>{{ group.name }}</div>
      <span matLine class="details text-secondary"
        ><span *ngIf="group.children.length > 0"
          >{{ group.children.length | i18nPlural: childGroupsMapping }}
        </span>
        <!-- TODO: Count in child group devices too -->
        {{ (getDevices(group.id) | async)?.length | i18nPlural: lampMapping }}
        <!-- TODO: if > 1 → 'N profiles' + popover with details -->
        {{ (getProfile(group.profileId) | async)?.name }}
        profile</span
      >
    </mat-list-option>
  </ng-container>
  <!-- <mat-list-option role="listitem">
    <div class="text-secondary" matLine>Unassigned</div>
    <span matLine>78 lamps, 3 segment controllers</span>
  </mat-list-option> -->
</mat-selection-list>
