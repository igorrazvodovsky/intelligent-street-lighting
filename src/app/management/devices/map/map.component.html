<div id="map-controls">
  <div id="map-controls__layers">
    <!-- TODO: Legend (inline and in popover for longer lists) -->
    <button
      (click)="map.zoomIn(1)"
      type="button"
      aria-label="Zoom in"
      mat-icon-button
    >
      <mat-icon svgIcon="zoomInBold" aria-hidden="true"></mat-icon>
    </button>

    <button
      (click)="map.zoomOut(1)"
      type="button"
      aria-label="Zoom out"
      mat-icon-button
    >
      <mat-icon svgIcon="zoomOutBold" aria-hidden="true"></mat-icon>
    </button>
    <map-legend></map-legend>
    <map-layer-menu></map-layer-menu>
  </div>
</div>

<div class="map-container">
  <div class="map-frame">
    <div id="map"></div>
  </div>
</div>
