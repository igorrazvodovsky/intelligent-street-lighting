<app-page-actions>
  Users
  <button type="button" aria-label="Add user" mat-icon-button>
    <mat-icon svgIcon="plusBold" aria-hidden="true"></mat-icon></button
></app-page-actions>

<table mat-table matSort aria-label="Users">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
    <td mat-cell *matCellDef="let row">{{ row.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let row">{{ row.name }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
    <td mat-cell *matCellDef="let row">{{ row.status }}</td>
  </ng-container>

  <ng-container matColumnDef="enabled">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Enabled</th>
    <td mat-cell *matCellDef="let row">
      <mat-icon
        *ngIf="row.enabled"
        svgIcon="checkRegular"
        aria-hidden="true"
      ></mat-icon>
    </td>
  </ng-container>

  <ng-container matColumnDef="locked">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Locked</th>
    <td mat-cell *matCellDef="let row">
      <mat-icon
        *ngIf="row.locked"
        svgIcon="lockRegular"
        aria-hidden="true"
      ></mat-icon>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<mat-paginator
  #paginator
  [length]="dataSource?.data?.length"
  [pageIndex]="0"
  [pageSize]="20"
  [pageSizeOptions]="[5, 10, 20]"
>
</mat-paginator>
