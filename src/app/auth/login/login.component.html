<mat-card>
  <mat-card-header>
    <mat-card-title>Acme</mat-card-title>
    <mat-card-subtitle> Street lighting control system </mat-card-subtitle>
  </mat-card-header>
  <form>
    <mat-form-field dense>
      <mat-label>Email</mat-label>
      <input autofocus type="email" matInput />
      <mat-error>Please provide a valid email address</mat-error>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Password</mat-label>
      <input type="password" matInput />
      <mat-error>Please provide a valid password</mat-error>
    </mat-form-field>
    <button
      [disabled]="loading$ | async"
      (click)="login()"
      mat-flat-button
      color="accent"
    >
      Login
    </button>
    <a mat-button routerLink="../recovery">Forgot your password?</a>
  </form>
</mat-card>
