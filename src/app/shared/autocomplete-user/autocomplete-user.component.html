<form>
  <mat-form-field class="no-hint">
    <input
      type="text"
      matInput
      [formControl]="myControl"
      [matAutocomplete]="auto"
      placeholder="John Smith"
    />
    <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn">
      <mat-option
        *ngFor="let option of filteredOptions | async"
        [value]="option"
      >
        {{ option.name }}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>
</form>
