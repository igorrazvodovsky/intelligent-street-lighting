<mat-card (click)="openDialog(task)">
  <mat-card-header>
    <mat-card-title>
      <mat-icon
        *ngIf="!deviceInfo"
        inline
        matListIcon
        svgIcon="ticketMedium"
        aria-hidden="true"
      ></mat-icon>

      {{ task.title }}
      <div class="badge-list" aria-label="Status and priority">
        <div
          class="badge"
          [ngClass]="{
            success: task.status == 'New',
            warning: task.status == 'Rejected'
          }"
        >
          {{ task.status }}
        </div>
        <div
          *ngIf="task.priority !== 'Normal' && task.status !== 'Rejected'"
          class="badge"
          [ngClass]="{ warning: task.priority == 'High' }"
        >
          {{ task.priority }} priority
        </div>
      </div>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content class="text-secondary">
    <div *ngIf="deviceInfo">
      <mat-icon
        inline
        class="small"
        svgIcon="locationRegular"
        aria-hidden="true"
      ></mat-icon>
      {{ task.deviceId }}
    </div>
    <div>
      <mat-icon
        inline
        class="small"
        svgIcon="userRegular"
        aria-hidden="true"
      ></mat-icon>
      {{ task.assignee ? task.assignee : "Unassigned" }}
    </div>
    <div *ngIf="task.comments.length">
      <mat-icon
        inline
        class="small"
        svgIcon="messageRegular"
        aria-hidden="true"
      ></mat-icon>
      {{ task.comments.length }} comments
    </div>
  </mat-card-content>
</mat-card>
