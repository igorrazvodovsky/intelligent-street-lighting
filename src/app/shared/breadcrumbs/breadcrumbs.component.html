<nav class="breadcrumbs mat-h2" role="navigation">
  <a href="./home/">
    <span class="home-label">Daugavpils</span>
  </a>

  <span *ngIf="groupId || deviceId" class="crumb-separator" aria-hidden="true"
    >·</span
  >

  <ng-container *ngIf="groupId">
    <span class="crumb" *ngFor="let level of tree; let i = index">
      <a href="./home/blog/front-end/">{{ selectedBranch[i].name }}</a>
      <span class="crumbicon">
        <mat-icon svgIcon="dropdownMedium"></mat-icon>
        <select class="disguised-select" title="Navigate to another group">
          <option
            *ngFor="let group of level"
            [selected]="group.id == selectedBranch[i].id"
          >
            {{ group.name }}
          </option>
        </select>
      </span>
    </span>
  </ng-container>

  <span *ngIf="deviceId" class="crumb">
    <a aria-current="page"> {{ currentDevice.name }}</a>
    <span class="crumbicon">
      <mat-icon svgIcon="dropdownMedium"></mat-icon>
      <select class="disguised-select" title="Navigate to another device">
        <option
          [selected]="device.id == deviceId"
          *ngFor="let device of devices"
        >
          {{ device.name }}
        </option>
      </select>
    </span>
  </span>
</nav>
