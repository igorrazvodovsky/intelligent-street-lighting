<h2 mat-dialog-title>Device model</h2>
<a
  href=""
  id="link"
  type="button"
  aria-label="Link to specification"
  mat-icon-button
>
  <mat-icon svgIcon="linkRegular" aria-hidden="true"></mat-icon>
</a>

<mat-list>
  <mat-list-item>
    <div mat-line>Name</div>
    <div mat-line>SRL068757L11B032SNMG1</div>
  </mat-list-item>
  <mat-list-item>
    <div mat-line>Wattage</div>
    <div mat-line>68</div>
  </mat-list-item>
  <mat-list-item>
    <div mat-line>Control type</div>
    <div mat-line>DALI</div>
  </mat-list-item>
  <mat-list-item>
    <div mat-line>...</div>
  </mat-list-item>
</mat-list>
<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="true">Close</button>
  <!-- TODO: Edit in the same dialog -->
  <button mat-button [mat-dialog-close]="true">Edit</button>
</mat-dialog-actions>
